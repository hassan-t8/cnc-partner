name: Build Android

# Auto-build is DISABLED for now — this workflow only runs when triggered
# manually from the Actions tab ("Run workflow"). No build on push, pull
# request, merge, or tag.
#
# To re-enable auto-build later, restore the triggers below:
#   push:
#     branches: [main]
#     tags: ['v*']
#   pull_request:
#     branches: [main]
on:
  workflow_dispatch:

jobs:
  build:
    name: Build release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Build universal APK
        run: flutter build apk --release

      - name: Build per-ABI APKs (smaller per-device downloads)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cnc-partner-apks
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      # Only on a version tag (e.g. git tag v1.0.0 && git push --tags)
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
