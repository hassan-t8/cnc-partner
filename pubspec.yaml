name: cnc_partner
description: "CNC Partner — mobile app for cleaning-service partners and field workers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (Riverpod — scalable, testable)
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Auth / JWT
  jwt_decoder: ^2.0.1

  # Routing
  go_router: ^14.6.2

  # Maps & launching
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.1

  # Media
  image_picker: ^1.1.2

  # UI
  shimmer: ^3.0.0
  intl: ^0.19.0
  fluttertoast: ^8.2.8
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
